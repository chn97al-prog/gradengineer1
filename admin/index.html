<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الدخول | لوحة التحكم</title>
  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
  
  <style>
    /* تصميم واجهة قفل بسيطة وأنيقة */
    .lock-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #111; color: #fff; display: flex; flex-direction: column;
      align-items: center; justify-content: center; z-index: 99999; font-family: sans-serif;
    }
    .lock-box { background: #222; padding: 30px; border-radius: 8px; text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
    .lock-input { padding: 10px; width: 200px; border: none; border-radius: 4px; margin-top: 15px; text-align: center; font-size: 16px; }
    .lock-btn { padding: 10px 20px; background: #b89742; border: none; color: #fff; border-radius: 4px; margin-top: 10px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <div id="lockScreen" class="lock-screen">
    <div class="lock-box">
      <h2>لوحة تحكم تجهيزات المهندس</h2>
      <p>الرجاء إدخال الرمز السري للدخول</p>
      <input type="password" id="secretKey" class="lock-input" placeholder="••••••••"><br>
      <button onclick="checkPassword()" class="lock-btn">دخول</button>
    </div>
  </div>

  <script>
    function checkPassword() {
      const password = document.getElementById('secretKey').value;
      
      //  اختر الرمز السري الخاص بك هنا (امسح 123456 واكتب رمزك الخاص)
      if (password === "123456") { 
        // إذا كان الرمز صحيحاً، تختفي شاشة القفل وتفتح اللوحة
        document.getElementById('lockScreen').style.display = 'none';
      } else {
        alert("الرمز السري غير صحيح!");
      }
    }
  </script>

</body>
</html>
