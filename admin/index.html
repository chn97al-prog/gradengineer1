<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>بوابة الدخول | لوحة التحكم</title>
  
  <style>
    /* تصميم واجهة قفل أنيقة واحترافية تناسب تجهيزات المهندس */
    body { margin: 0; padding: 0; background: #111; font-family: 'Tajawal', sans-serif; }
    .lock-screen {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 99999;
    }
    .lock-box { 
      background: #1a1a1a; padding: 40px; border-radius: 12px; text-align: center; 
      box-shadow: 0 8px 25px rgba(0,0,0,0.7); border: 1px solid #b89742; max-width: 350px; width: 90%;
    }
    h2 { color: #b89742; margin-bottom: 10px; font-size: 22px; }
    p { color: #ccc; font-size: 14px; margin-bottom: 20px; }
    .lock-input { 
      padding: 12px; width: 80%; border: 1px solid #444; background: #222; color: #fff;
      border-radius: 6px; text-align: center; font-size: 18px; outline: none; transition: 0.3s;
    }
    .lock-input:focus { border-color: #b89742; }
    .lock-btn { 
      padding: 12px 30px; background: #b89742; border: none; color: #111; 
      border-radius: 6px; margin-top: 15px; cursor: pointer; font-weight: bold; font-size: 16px; width: 87%;
    }
    .lock-btn:hover { background: #d4af37; }
    #cms-root { display: none; } /* إخفاء اللوحة حتى يتم إدخال الرمز */
  </style>
</head>
<body>

  <div id="lockScreen" class="lock-screen">
    <div class="lock-box">
      <h2>لوحة تحكم تجهيزات المهندس</h2>
      <p>الرجاء إدخال الرمز السري الخاص بك للمتابعة</p>
      <input type="password" id="secretKey" class="lock-input" placeholder="••••••••" onkeydown="if(event.key === 'Enter') checkPassword()"><br>
      <button onclick="checkPassword()" class="lock-btn">تسجيل الدخول</button>
    </div>
  </div>

  <div id="cms-root"></div>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>

  <script>
    function checkPassword() {
      const password = document.getElementById('secretKey').value;
      
      // 👇👇 غير الرمز السري (123456) للرمز الذي تريده أنت هنا 👇👇
      if (password === "mu97sf19") { 
        // إذا كان الرمز صحيحاً، تختفي شاشة القفل وتظهر لوحة التحكم
        document.getElementById('lockScreen').style.display = 'none';
        document.getElementById('cms-root').style.display = 'block';
      } else {
        alert("الرمز السري الذي أدخلته غير صحيح! حاول مرة أخرى.");
      }
    }
  </script>

</body>
</html>
